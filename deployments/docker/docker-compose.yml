services:
  postgres:
    image: postgres:17-alpine
    container_name: ludic_postgres
    profiles:
      - dev
    env_file:
      - ../../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ludic_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: ludic_app
    profiles:
      - dev
    env_file:
      - ../../.env
    environment:
      RUN_SEED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ludic_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../../../ludic-matricula-ui
      dockerfile: Dockerfile
    container_name: ludic_frontend
    profiles:
      - dev
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ludic_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: ludic_caddy
    profiles:
      - dev
    ports:
      - "9000:80"
    volumes:
      - ../../deployments/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - ludic_network

  postgres_test:
    image: postgres:17-alpine
    container_name: ludic_postgres_test
    profiles:
      - test
    env_file:
      - ../../.env
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - ludic_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app_test:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: ludic_app_test
    profiles:
      - test
    env_file:
      - ../../.env
    environment:
      RUN_SEED: "true"
      POSTGRES_HOST: ludic_postgres_test
    depends_on:
      postgres_test:
        condition: service_healthy
    networks:
      - ludic_network
    ports:
      - "8080:8080"

volumes:
  postgres_data:

networks:
  ludic_network:
    name: ludic_network